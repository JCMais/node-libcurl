name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v5.0.3)'
        required: true

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # Step 1: Create the GitHub Release (once, before binary uploads)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG=${{ steps.tag.outputs.value }}
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping creation."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Prebuilt binaries for $TAG" \
              --draft
          fi

  # Step 2: Build prebuilt binaries (Windows × Node.js versions)
  build-windows:
    name: Build / Windows / Node.js ${{ matrix.node-version }}
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --ignore-scripts

      - name: Download libcurl-impersonate
        run: node scripts/impersonate-setup.js --force

      - name: Build native addon
        run: pnpm pregyp rebuild

      - name: Copy DLLs to lib/binding
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path lib/binding | Out-Null
          Get-ChildItem deps/libcurl-impersonate/bin/*.dll | Copy-Item -Destination lib/binding/
          Write-Host "Files in lib/binding:"
          Get-ChildItem lib/binding | Select-Object Name

      - name: Package binary
        run: pnpm pregyp package

      - name: Upload binary to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          $tarball = Get-ChildItem -Recurse build/stage/*.tar.gz | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Uploading: $tarball"
          gh release upload ${{ needs.create-release.outputs.tag }} "$tarball" --clobber

  # Step 3: Mark release as non-draft after all builds complete
  finalize-release:
    name: Finalize Release
    runs-on: ubuntu-latest
    needs: [create-release, build-windows]
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit ${{ needs.create-release.outputs.tag }} \
            --draft=false
